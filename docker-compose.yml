services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ALLOWED_ORIGINS: "http://localhost:8000"
    volumes:
      # Local Excel files become reachable as data/foo.xlsx from the API.
      - ./data:/app/data:ro
